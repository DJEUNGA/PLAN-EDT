<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDT — Connexion</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">

    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#4F46E5"/>
        <rect x="8" y="10" width="6" height="6" rx="1.5" fill="white"/>
        <rect x="17" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="26" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.4"/>
        <rect x="8" y="19" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="17" y="19" width="6" height="6" rx="1.5" fill="white"/>
        <rect x="26" y="19" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="8" y="28" width="6" height="6" rx="1.5" fill="white" opacity="0.4"/>
        <rect x="17" y="28" width="6" height="6" rx="1.5" fill="white" opacity="0.7"/>
        <rect x="26" y="28" width="6" height="6" rx="1.5" fill="white"/>
      </svg>
      <h1>PlanEDT</h1>
    </div>

    <p class="auth-subtitle">Gestionnaire d'emplois du temps</p>

    <div class="card auth-card">

      <div id="erreur-msg" class="alert alert-danger" style="display:none;"></div>

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input type="email" id="email" placeholder="vous@exemple.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="mot_de_passe">Mot de passe</label>
        <div class="input-password">
          <input type="password" id="mot_de_passe" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="btn-eye" id="toggle-mdp" title="Afficher / masquer">
            <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-connexion">
        <span id="btn-text">Se connecter</span>
        <span id="btn-spinner" class="spinner" style="display:none;"></span>
      </button>

    </div>

    <p class="auth-footer">
      Plateforme réservée aux membres de l'établissement.
    </p>

  </div>

  <script src="js/auth.js"></script>
  <script>
   const API = '';

    const btnConnexion = document.getElementById('btn-connexion');
    const btnText      = document.getElementById('btn-text');
    const btnSpinner   = document.getElementById('btn-spinner');
    const erreurMsg    = document.getElementById('erreur-msg');
    const toggleMdp    = document.getElementById('toggle-mdp');
    const inputMdp     = document.getElementById('mot_de_passe');

    // Afficher / masquer le mot de passe
    toggleMdp.addEventListener('click', () => {
      const estCache = inputMdp.type === 'password';
      inputMdp.type  = estCache ? 'text' : 'password';
      toggleMdp.style.opacity = estCache ? '1' : '0.4';
    });

    // Connexion avec Entrée
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnConnexion.click();
    });

    // Connexion
    btnConnexion.addEventListener('click', async () => {
      const email       = document.getElementById('email').value.trim();
      const mot_de_passe = inputMdp.value;

      erreurMsg.style.display = 'none';

      if (!email || !mot_de_passe) {
        afficherErreur('Veuillez remplir tous les champs.');
        return;
      }

      setChargement(true);

      try {
        const reponse = await fetch(`${API}/api/auth/connexion`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, mot_de_passe }),
        });

        const data = await reponse.json();

        if (!reponse.ok) {
          afficherErreur(data.erreur || 'Erreur de connexion.');
          return;
        }

        // Sauvegarder le token et les infos utilisateur
        sauvegarderSession(data.token, data.utilisateur);

        // Rediriger selon le rôle
        switch (data.utilisateur.role) {
          case 'admin':      window.location.href = 'dashboard.html';  break;
          case 'professeur': window.location.href = 'professeur.html'; break;
          case 'etudiant':   window.location.href = 'emploi.html';     break;
          default:           window.location.href = 'emploi.html';
        }

      } catch (err) {
        afficherErreur('Impossible de contacter le serveur. Vérifiez votre connexion.');
      } finally {
        setChargement(false);
      }
    });

    function afficherErreur(msg) {
      erreurMsg.textContent    = msg;
      erreurMsg.style.display  = 'block';
    }

    function setChargement(actif) {
      btnConnexion.disabled    = actif;
      btnText.style.display    = actif ? 'none'  : 'inline';
      btnSpinner.style.display = actif ? 'inline-block' : 'none';
    }
  </script>
</body>
</html>
